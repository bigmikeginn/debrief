<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#090a0d">
  <title>Opening Debrief Login...</title>
  <link rel="icon" type="image/png" href="debrief-mark-gold.png">
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 50% 20%, rgba(255, 202, 118, 0.08), transparent 24rem),
        linear-gradient(180deg, #0d0e12 0%, #08090c 46%, #0d0f13 100%);
      color: #f4f5f7;
      font-family: "Plus Jakarta Sans", sans-serif;
    }
    body {
      display: grid;
      place-items: center;
      padding: 2rem;
      text-align: center;
    }
    .splash {
      display: grid;
      gap: 0.85rem;
      padding: 1.2rem 1.25rem;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 1.25rem;
      background: rgba(17, 19, 24, 0.92);
      box-shadow: 0 28px 80px rgba(0,0,0,0.42);
      max-width: 20rem;
      width: 100%;
    }
    .splash strong {
      font-size: 1.1rem;
      letter-spacing: 0.01em;
    }
    .splash p {
      margin: 0;
      color: rgba(244, 245, 247, 0.72);
      line-height: 1.45;
    }
    .splash .bar {
      width: 100%;
      height: 0.35rem;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
    }
    .splash .bar::after {
      content: "";
      display: block;
      width: 42%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #ffca76, #c66d34);
      animation: shimmer 1.25s ease-in-out infinite;
    }
    @keyframes shimmer {
      0% { transform: translateX(-18%); opacity: 0.7; }
      50% { transform: translateX(112%); opacity: 1; }
      100% { transform: translateX(-18%); opacity: 0.7; }
    }
  </style>
  <script>
    const destination = new URL("/login", window.location.href);
    destination.search = window.location.search;
    destination.hash = window.location.hash;
    requestAnimationFrame(() => {
      window.setTimeout(() => window.location.replace(destination.href), 180);
    });
  </script>
</head>
<body>
  <div class="splash" aria-live="polite">
    <strong>Opening Debrief login</strong>
    <p>Loading your secure sign-in screen.</p>
    <div class="bar" aria-hidden="true"></div>
  </div>
</body>
</html>
