<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign In to Debrief</title>
  </head>
  <body style="margin:0;padding:0;background:#0b1526;font-family:Arial,sans-serif;color:#e9f1ff;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#0b1526;padding:24px 0;">
      <tr>
        <td align="center">
          <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="width:100%;max-width:600px;background:#14243b;border:1px solid #274368;border-radius:12px;overflow:hidden;">
            <tr>
              <td style="padding:24px 24px 8px 24px;">
                <p style="margin:0;color:#8fb3de;font-size:12px;letter-spacing:1px;text-transform:uppercase;">Jitsu-Do Karate + BJJ</p>
                <h1 style="margin:8px 0 0 0;font-size:28px;line-height:1.2;color:#ffffff;">Sign In to Debrief</h1>
              </td>
            </tr>
            <tr>
              <td style="padding:16px 24px 0 24px;">
                <p style="margin:0 0 12px 0;color:#d8e7ff;font-size:16px;line-height:1.5;">
                  Tap the button below to securely sign in.
                </p>
                <p style="margin:0 0 20px 0;color:#a9c1e4;font-size:14px;line-height:1.5;">
                  Requested for: {{ .Email }}
                </p>
                <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:12px 20px;background:#2ac5ff;color:#032138;text-decoration:none;font-weight:bold;border-radius:8px;">
                  Sign In
                </a>
              </td>
            </tr>
            <tr>
              <td style="padding:20px 24px 24px 24px;">
                <p style="margin:0;color:#89a8d2;font-size:13px;line-height:1.5;">
                  If you did not request this, you can safely ignore this email.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
